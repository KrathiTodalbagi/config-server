spring:
  datasource:
    url: 'jdbc:postgresql://localhost:5432/department_db'
    username: 'postgres'
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: 'org.hibernate.dialect.PostgreSQLDialect'

eureka:
  instance:
    client:
      serverUrl:
        defaultZone: 'http://localhost:8761/eureka/'
